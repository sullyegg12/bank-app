<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Apex Ledger</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Apex Ledger">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="https://img.icons8.com/fluent/180/000000/bank.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluent/48/000000/bank.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="logo-area">
            <i class="fa-solid fa-building-columns bank-logo"></i>
            <h1>Apex Ledger</h1>
        </div>
        <span class="status-tag">Mock Mode</span>
    </header>

    <main class="app-container">
        
        <section class="balance-grid">
            <div class="card total-card">
                <h3>Total Net Worth</h3>
                <p id="total-balance">$0.00</p>
                <i class="fa-solid fa-wallet card-bg-icon"></i>
            </div>
            <div class="card spending-card">
                <h3><i class="fa-solid fa-money-bill-wave"></i> Spending</h3>
                <p id="spending-balance">$0.00</p>
            </div>
            <div class="card savings-card">
                <h3><i class="fa-solid fa-piggy-bank"></i> Savings</h3>
                <p id="savings-balance">$0.00</p>
            </div>
        </section>

        <section class="app-section">
            <h2><i class="fa-solid fa-bolt"></i> Weekly Allowance Automation</h2>
            <div class="automation-box">
                <p class="description">Schedule an allowance. It automatically deposits into your Spending account when the chosen day arrives.</p>
                
                <form id="automation-form" class="action-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="auto-amount">Weekly Amount</label>
                            <div class="input-group">
                                <span class="currency-prefix">$</span>
                                <input type="number" id="auto-amount" placeholder="0.00" step="0.01" min="0.01" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="auto-day">Deposit Day</label>
                            <select id="auto-day" required>
                                <option value="5">Friday</option>
                                <option value="6">Saturday</option>
                                <option value="0">Sunday</option>
                                <option value="1">Monday</option>
                                <option value="2">Tuesday</option>
                                <option value="3">Wednesday</option>
                                <option value="4">Thursday</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="button-split-row">
                        <button type="submit" class="btn btn-primary">Save Schedule</button>
                        <button type="button" id="cancel-auto-btn" class="btn btn-danger hidden">Cancel Weekly</button>
                    </div>
                </form>
                
                <div id="automation-status" class="status-text">Automation: Off</div>
            </div>
        </section>

        <section class="app-section">
            <h2><i class="fa-solid fa-arrows-rotate"></i> New Transaction</h2>
            
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('deposit')">Deposit / Expense</button>
                <button class="tab-btn" onclick="switchTab('transfer')">Internal Transfer</button>
            </div>

            <form id="transaction-form" class="action-form">
                <div class="form-group">
                    <label for="tx-type">Transaction Type</label>
                    <select id="tx-type" required>
                        <option value="income">Add Money (+)</option>
                        <option value="expense">Spend Money (-)</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tx-account">Target Account</label>
                        <select id="tx-account" required>
                            <option value="spending">Spending</option>
                            <option value="savings">Savings</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tx-amount">Amount</label>
                        <div class="input-group">
                            <span class="currency-prefix">$</span>
                            <input type="number" id="tx-amount" placeholder="0.00" step="0.01" min="0.01" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tx-desc">Description</label>
                    <input type="text" id="tx-desc" placeholder="e.g., Extra Allowance, Snacks, Video Game" required>
                </div>

                <button type="submit" class="btn btn-primary">Log Transaction</button>
            </form>

            <form id="transfer-form" class="action-form hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label for="tf-from">From</label>
                        <select id="tf-from" required>
                            <option value="spending">Spending</option>
                            <option value="savings">Savings</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tf-to">To</label>
                        <select id="tf-to" required>
                            <option value="savings">Savings</option>
                            <option value="spending">Spending</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tf-amount">Transfer Amount</label>
                    <div class="input-group">
                        <span class="currency-prefix">$</span>
                        <input type="number" id="tf-amount" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Execute Transfer</button>
            </form>
        </section>

        <section class="app-section">
            <div class="section-header-flex">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> Transaction Ledger</h2>
                <button id="clear-data-btn" class="btn-text">Clear All Data</button>
            </div>
            <div class="ledger-container">
                <ul id="transaction-history" class="history-list">
                    </ul>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
